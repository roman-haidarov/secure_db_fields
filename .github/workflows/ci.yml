name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruby:
    name: Ruby ${{ matrix.ruby }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ruby: ['3.1', '3.4']

    steps:
      - uses: actions/checkout@v4

      - name: Install C libraries (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev pkg-config

      - name: Install C libraries (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3 pkg-config

      - name: Set OpenSSL paths (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig:$PKG_CONFIG_PATH" >> "$GITHUB_ENV"
          echo "CPPFLAGS=-I$(brew --prefix openssl@3)/include $CPPFLAGS" >> "$GITHUB_ENV"
          echo "LDFLAGS=-L$(brew --prefix openssl@3)/lib $LDFLAGS" >> "$GITHUB_ENV"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Compile extension
        run: bundle exec rake compile

      - name: Run tests
        run: bundle exec rake test

      - name: Build gem
        run: gem build secure_db_fields.gemspec

      - name: Build MySQL DBA package
        run: |
          mkdir -p tmp/ci
          bundle exec secure_db_fields db package mysql \
            --output tmp/ci/secure_db_fields-mysql.tar.gz \
            --force
          test -s tmp/ci/secure_db_fields-mysql.tar.gz
          tar -tzf tmp/ci/secure_db_fields-mysql.tar.gz | grep -Fx 'secure_db_fields-mysql-0.1.1/Makefile'
          tar -tzf tmp/ci/secure_db_fields-mysql.tar.gz | grep -Fx 'secure_db_fields-mysql-0.1.1/bin/install'

  mysql-e2e:
    name: MySQL 5.7 UDF e2e
    needs: ruby
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      SDF_MYSQL_WAIT_SECONDS: '120'

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev pkg-config default-libmysqlclient-dev
          test -f /usr/include/mysql/mysql.h
          docker version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Compile Ruby extension
        run: bundle exec rake compile

      - name: Run MySQL 5.7 UDF end-to-end test
        run: bash mysql_udf/test/run_e2e.sh
